name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Vitest
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run dev &
      
      - name: Wait for app
        run: npx wait-on http://localhost:5173

      - name: Run Cypress E2E tests
        run: npx cypress run