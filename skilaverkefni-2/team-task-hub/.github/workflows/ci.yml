name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Vitest
        run: npm run test

      - name: Build project
        run: npm run build

      - name: Start app
        run: npm run dev &

      - name: Wait for app
        run: npx wait-on http://localhost:5173

      - name: Run Cypress
        run: npx cypress run